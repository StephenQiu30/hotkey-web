name: Bug 报告
description: 提交可复现的页面、交互或数据展示问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。安全漏洞请使用仓库 Security 页面私密报告，不要填写此表单。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 实际发生了什么？对用户造成了什么影响？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 观察到……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本或提交
      placeholder: commit SHA / release version
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、浏览器、Node.js、视口尺寸及后端版本。
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 截图、录像或日志
      description: 请先移除 Token、邮箱、真实内容和其他隐私信息。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现重复问题。
          required: true
        - label: 这不是需要私密报告的安全漏洞。
          required: true
