version: "3.9"

services:
  hotkey-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      # hotkey-server backend — adjust to match your network
      - NEXT_PUBLIC_API_BASE_URL=${API_BASE_URL:-http://host.docker.internal:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Optional: start the Go backend alongside the web app.
  # Uncomment and adjust the build context path if you have hotkey-server
  # in a sibling directory.
