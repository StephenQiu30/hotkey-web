  #     - "8080:8080"
  #   environment:
  #     - DB_DSN=postgres://hotkey:hotkey@db:5432/hotkey?sslmode=disable
  #     - REDIS_ADDR=redis:6379
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_started
  #   restart: unless-stopped
